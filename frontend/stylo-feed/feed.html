<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylo · Feed</title>
  <!--   use ../ to go up a folder level -->
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="feed.css" />


  <!-- link to google icon API to access svg icons -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

  <!-- for loading outfit data -->
    <script src="../data.js" defer></script>
  <script src="../components.js" defer></script>
    <script src="feed.js" defer></script>

</head>

<!-- post new btn is above body -->
<div class="create-new">
  <button class="post-btn" id="post-btn">Create Post</button>
</div>

<body>
  <div id="header-mount"></div>

  <div class="main-content">
    <h1 class="title">My Feed . ✦ ݁ ˖</h1>
    <p class="feed-desc">Discover more fits. Remix a fit by styling it as your own!</p>

    <div class="nav-bar">
      <div>
        <button id="discover-btn" class="tab-btn active-tab">Discover</button>
        <button id="following-btn" class="tab-btn">Following</button>
      </div>

      <div class="filters">
        <select id="filter-sort" class="filter-button">
          <option value="" hidden>Date Posted</option>
          <option value="most-recent">Most Recent</option>
          <option value="oldest">Oldest</option>
          <option value="most-popular">Most Popular</option>
        </select>

        <select id="filter-aesthetic" class="filter-button">
          <option value="" hidden>Select Aesthetic</option>
          <option value="dark-academia">Dark Academia</option>
          <option value="y2k">Y2K</option>
          <option value="cottagecore">Cottagecore</option>
          <option value="grunge">Grunge</option>
        </select>

        <select id="filter-category" class="filter-button">
          <option value="" hidden>Select Category</option>
          <option value="inspo">Outfit Inspiration</option>
          <option value="ootd">OOTD</option>
          <option value="accessories">Accessories</option>
          <option value="staples">Closet Staples</option>
        </select>
      </div>


    </div>
    <!-- feed container is empty because we populate posts in js -->
    <div class="entire-feed" id="feed-container">

    </div>

    <!-- infinite scroll div gets populated in js -->
    <div id="infinite-scroll"></div>
  </div>

  <div class="share-popup" id="share-popup" hidden>

    <div class="share-popup-card" id="share-popup-card">
 <!--      <button class="post-close" id="share-post-close">
        <span class="material-symbols-outlined">close</span>
      </button> -->

      <div>
        <h2>Remix this outfit?</h2>
        <p>"Remixing" makes a copy of the outfit for you to edit.</p>
      </div>

      <button class="share-btn-yes" id="share-btn-yes">
        Remix it!
      </button>

      <button class="share-btn-close" id="share-btn-close">
        No, take me back
      </button>

    </div>
  </div>



  <div class="post-overlay" id="post-overlay">
    <div class="post-overlay-card" id="post-overlay-card">
      <button class="post-close" id="post-close">
        <span class="material-symbols-outlined">close</span>
      </button>

      <div class="post-body">
        <div class="post-left">
          <div class="post-username" id="post-username"></div>
          <div class="post-img-wrapper">
            <img class="post-outfit-img" id="post-outfit-img" src="" alt="post frame">
           <img class="post-overlay-img" id="post-overlay-img" src="" alt="clothing item">
          </div>
          <div class="post-actions">
            <button class="action-btn post-like-btn" id="post-like-btn">
              <span class="material-symbols-outlined">favorite</span>
              <span class="action-count" id="post-like-count">0</span>
            </button>
            <button class="action-btn post-comment-btn" id="post-comment-btn">
              <span class="material-symbols-outlined">chat_bubble</span>
              <span class="action-count" id="post-comment-count">0</span>
            </button>
            <button class="action-btn post-share-btn" id="post-share-btn">
              <span class="material-symbols-outlined">refresh</span>
              <span class="action-count" id="post-share-count">0</span>
            </button>
          </div>
          <p class="post-caption" id="post-caption"></p>
        </div>

        <div class="post-right">
          <h3 class="comments-heading">Comments</h3>
          <div class="comments-list" id="comments-list"></div>
          <div class="comment-input-row">
            <input type="text" id="comment-input" placeholder="Join the conversation..." />
            <button id="submit-comment-btn">Post</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("header-mount")
      .innerHTML = window.STYLO_UI.renderHeader("feed");
    });
  </script>

</body>

</html>
