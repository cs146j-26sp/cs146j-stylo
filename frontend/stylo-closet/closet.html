<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stylo · Closet</title>

  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="closet.css" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <script src="../data.js" defer></script>
  <script src="../components.js" defer></script>
  <script src="closet.js" defer></script>
</head>
<body>
  <div id="header-mount"></div>

  <div class="main-content">
    <h1 class="title">My Closet . ✦ ݁ ˖</h1>

    <div class="subhead">
      <div class="subhead-note" id="closet-summary">
        <!-- filled by closet.js -->
      </div>
      <button class="btn-filled" id="add-item-btn"
        onclick="document.getElementById('upload-overlay').classList.add('is-open')">
        + Add a piece
      </button>
    </div>

    <div class="closet-filter-row" id="closet-filters">
      <span class="closet-filter-label">Status</span>
      <div class="chip-row" data-group="status">
        <button class="chip is-active" data-value="all">all</button>
        <button class="chip" data-value="owned">owned</button>
        <button class="chip" data-value="wishlist">wishlist</button>
      </div>
    </div>
    <div class="closet-filter-row">
      <span class="closet-filter-label">Category</span>
      <div class="chip-row" data-group="category">
        <button class="chip is-active" data-value="all">all</button>
        <button class="chip" data-value="tops">tops</button>
        <button class="chip" data-value="bottoms">bottoms</button>
        <button class="chip" data-value="shoes">shoes</button>
        <button class="chip" data-value="accessories">accessories</button>
      </div>
    </div>

    <div class="closet-grid" id="closet-grid"></div>
  </div>

  <!-- add a piece modal -->
  <div class="modal-overlay" id="upload-overlay"
    onclick="if(event.target===this) this.classList.remove('is-open')"
  >
    <div class="upload-card">
      <button class="modal-close-btn" id="upload-close-btn" aria-label="close"
        onclick="document.getElementById('upload-overlay').classList.remove('is-open')">✕</button>
      <h2 class="upload-title">add a piece</h2>

      <div class="upload-dropzone" id="upload-dropzone">
        <input type="file" id="upload-file" accept="image/*" />
        <span class="material-symbols-outlined upload-dropzone-icon">upload</span>
        <p class="upload-dropzone-label">drop image or <span class="upload-browse">browse</span></p>
      </div>

      <div class="upload-preview-wrap" id="upload-preview-wrap">
        <img id="upload-preview-img" alt="preview" />
        <div class="upload-processing" id="upload-processing">
          <span class="upload-processing-dot"></span>removing background…
        </div>
      </div>

      <div class="upload-form">
        <div class="upload-field">
          <span class="upload-field-label">item name</span>
          <input class="upload-field-input" id="upload-name" type="text" placeholder="e.g. white linen shirt" />
        </div>
        <div class="upload-field">
          <span class="upload-field-label">category</span>
          <select class="upload-field-input" id="upload-category">
            <option value="top">tops</option>
            <option value="bottom">bottoms</option>
            <option value="shoes">shoes</option>
            <option value="accessory">accessories</option>
          </select>
        </div>
        <div class="upload-field">
          <span class="upload-field-label">status</span>
          <div class="upload-status-tabs" id="upload-status-tabs">
            <button class="upload-status-tab is-active" type="button" data-status="owned">owned</button>
            <button class="upload-status-tab" type="button" data-status="wishlist">wishlist</button>
          </div>
        </div>
      </div>

      <div class="upload-actions">
        <button class="upload-secondary-btn" id="upload-cancel-btn"
        onclick="document.getElementById('upload-overlay').classList.remove('is-open')">cancel</button>
        <button class="upload-primary-btn" id="upload-add-btn">add to closet</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("header-mount").innerHTML = window.STYLO_UI.renderHeader("closet");
    });
  </script>
</body>
</html>
