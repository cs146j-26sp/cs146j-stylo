<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stylo · Profile</title>

  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="profile.css" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <script src="../data.js" defer></script>
  <script src="../components.js" defer></script>
  <script src="profile.js" defer></script>
</head>
<body>
  <div id="header-mount"></div>

  <div class="main-content">
    <h1 class="title">Profile . ✦ ݁ ˖</h1>

    <!-- top: polaroid avatar + name + stats + actions -->
    <div class="profile-header">
      <div class="profile-polaroid">
        <div class="photo" id="avatar-initials">IM</div>
        <div class="caption" id="avatar-caption">@iris.m</div>
      </div>

      <div>
        <h2 class="profile-name" id="profile-name">Iris Morgan</h2>
        <p class="profile-handle" id="profile-handle">@iris.m</p>
        <p class="profile-bio" id="profile-bio">"Writing my closet onto paper."</p>

        <div class="profile-stats" id="profile-stats"></div>
      </div>

      <div class="profile-actions">
        <button class="filter-button" id="btn-edit-profile">Edit profile</button>
        <button class="filter-button" id="btn-follow">Follow</button>
        <button class="filter-button">Share</button>
      </div>
    </div>

    <!-- tabs -->
    <div class="profile-tabs" id="profile-tabs">
      <button class="profile-tab is-active" data-tab="outfits">outfits <span class="count" id="count-outfits"></span></button>
      <button class="profile-tab" data-tab="remixes">remixes <span class="count" id="count-remixes"></span></button>
      <button class="profile-tab" data-tab="closet">closet <span class="count" id="count-closet"></span></button>
    </div>

    <!-- grid -->
    <div id="tab-content"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("header-mount").innerHTML = window.STYLO_UI.renderHeader("");
    });
  </script>
  <!-- Edit profile modal -->
  <div class="modal-overlay" id="edit-modal" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">edit profile</h2>
        <button class="modal-close" id="modal-close" aria-label="close">&times;</button>
      </div>
      <form id="edit-form" class="modal-form">
        <div class="field">
          <label class="field-label" for="edit-name">display name</label>
          <input class="field-input" id="edit-name" type="text" />
        </div>
        <div class="field">
          <label class="field-label" for="edit-bio">bio</label>
          <input class="field-input" id="edit-bio" type="text" />
        </div>
        <div class="modal-actions">
          <button type="button" class="filter-button" id="modal-cancel">cancel</button>
          <button type="submit" class="btn-filled">save</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
