<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylo</title>
  <link rel="stylesheet" href="styles.css">

  <!-- link to google icon API to access svg icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <script src="script.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
</head>


<body>

  <header>
    <img class="menu-img" src="media/paper1.png">
    <div class="logo"> STYLO </div>
    <menu>
      <h2 class="menu-item">Studio</h2>
      <h2 class="menu-item">Feed</h2>
      <h2 class="menu-item">Closet</h2>
    </menu>

    <div class="account">
      <span class="material-symbols-outlined" style="font-size: 36px; color: var(--text);">account_circle</span>
    </div>

  </header>


  <div class="main-content">
    <h1 class="title">My Feed . ✦ ݁ ˖</h1>

    <div class="nav-bar">
      <div>
        <button id="discover-btn" class="tab-btn active-tab">Discover</button>
        <button id="following-btn" class="tab-btn">Following</button>

      </div>
      <div class="filters">
        <select class="filter-button">
          <option value="" hidden>Date Posted</option>
          <option value="most-recent">Most Recent</option>
          <option value="oldest">Oldest</option>
          <option value="most-popular">Most Popular</option>
        </select>

        <select class="filter-button">
          <option value="" hidden>Select Aesthetic</option>
          <option value="dark-academia">Dark Academia</option>
          <option value="y2k">Y2K</option>
          <option value="cottagecore">Cottagecore</option>
          <option value="grunge">Grunge</option>
        </select>

        <select class="filter-button">
          <option value="" hidden>Select Category</option>
          <option value="dark-academia">Outfit Inspiration</option>
          <option value="ootd">OOTD</option>
          <option value="cottagecore">Cottagecore</option>
          <option value="grunge">Grunge</option>
        </select>
      </div>


    </div>
    <div class="entire-feed" id="feed-container">
      
    </div>


  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <button class="modal-close" id="modal-close">
        <span class="material-symbols-outlined">close</span>
      </button>

      <div class="modal-body">
        <div class="modal-left">
          <div class="modal-username" id="modal-username"></div>
          <div class="modal-img-wrapper">
            <img class="modal-outfit-img" id="modal-outfit-img" src="" alt="Outfit">
          </div>
          <div class="modal-actions">
            <button class="action-btn modal-like-btn" id="modal-like-btn">
              <span class="material-symbols-outlined">favorite</span>
              <span class="action-count" id="modal-like-count">0</span>
            </button>
            <button class="action-btn modal-comment-btn" id="modal-comment-btn">
              <span class="material-symbols-outlined">chat_bubble</span>
              <span class="action-count" id="modal-comment-count">0</span>
            </button>
            <button class="action-btn modal-share-btn" id="modal-share-btn">
              <span class="material-symbols-outlined">refresh</span>
              <span class="action-count" id="modal-share-count">0</span>
            </button>
          </div>
          <p class="modal-caption" id="modal-caption"></p>
        </div>

        <div class="modal-right">
          <h3 class="comments-heading">Comments</h3>
          <div class="comments-list" id="comments-list"></div>
          <div class="comment-input-row">
            <input type="text" id="comment-input" placeholder="Add a comment…" />
            <button id="post-comment-btn">Post</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
